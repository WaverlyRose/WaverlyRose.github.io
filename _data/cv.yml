    Experience:
      - company: Yale University School of Medicine, Department of Neurosurgery
        position: AI Engineer
        location: New Haven, CT
        start_date: 2025-01
        summary: Building production AI for clinical use as a research affiliate.
        highlights:
          - "Productionized a privacy-safe LLM/RAG service deployed in spine tumor boards: Go-based orchestration and S3 streaming I/O behind FastAPI/Pydantic, deployed on Kubernetes (EKS) with Postgres/pgvector retrieval. Owns the system end-to-end across model integration, evaluation tooling, retrieval iteration, deployment, and incident response."
          - Designed structured-output pipeline producing FHIR-like JSON with inline citations, plus SRE-grade Grafana dashboards for reliability, latency, and reasoning-trace observability so model behavior stays auditable and decision-ready.
          - Leads cross-functional work across neurosurgeons, data scientists, and engineers to translate charts, imaging impressions, pathology, and guidelines into one-page briefs that accelerate oncologic decision-making.
          - "Stack: Go, Python (FastAPI/Pydantic), Postgres/pgvector, AWS (S3, ECR, EKS), Kubernetes, Docker, Grafana"

      - company: Yale University School of Medicine, Department of Neurosurgery, Gunel Lab
        position: Postgraduate Researcher
        location: New Haven, CT
        start_date: 2021-11
        end_date: 2025-03
        summary: End-to-end computational pathology and genomics for meningioma microenvironments.
        highlights:
          - Built end-to-end pipelines fusing whole-slide pathology, microscopy, and multicenter genomic data to characterize tumor microenvironments from sample preparation through scalable batch inference and quantitative validation.
          - Developed classical computer vision and machine learning workflows for subcellular structure detection and segmentation, with emphasis on robust preprocessing, scalable batch inference, and quantitative validation.
          - Engineered high-throughput genomic data processing utilities to parse heterogeneous multicenter datasets into standardized, analysis-ready dataframes and visualizations, accelerating cross-site interpretation and decision-making.

      - company: The Johns Hopkins University, Malone Center for Engineering in Healthcare (AI for Surgery Lab Startup)
        position: Research and Development Engineer
        location: Baltimore, MD
        start_date: 2023-10
        end_date: 2024-12
        summary: Engineered early product and model foundations for Circlage, a computer-vision platform for surgical skill assessment and OR efficiency analytics.
        highlights:
          - Prototyped an RNN-based surgical case duration prediction capability and designed administrator-facing analytics — forecasted durations, OR utilization trends, cost/earnings rollups, and staffing signals — intended for deployment at Johns Hopkins Hospital and the University of Maryland Medical Center.
          - Built human-in-the-loop feedback paths so UI interactions produce higher-quality labels, improving downstream computer-vision model performance over time.
          - Operated as the technical bridge between surgeons, OR administrators, and engineers; led structured concept and usability testing.

      - company: Yale University School of Medicine, Department of Radiology, Neuroradiology Section
        position: Lab Manager and Clinical Research Associate
        location: New Haven, CT
        start_date: 2020-10
        end_date: 2021-11
        summary: End-to-end research operations and evidence-engineering program management for the lab's AI-in-Neurooncology systematic review program.
        highlights:
          - Built and maintained reproducible screening pipelines (Covidence/DistillerSR) coordinating medical students, graduate students, and physicians.
          - Designed high-recall search strategies and executed structured retrieval across Ovid Embase, Ovid MEDLINE, Cochrane CENTRAL, and Web of Science; triaged 11,000+ abstracts and 700+ full-text manuscripts with audit-ready inclusion/exclusion logic.
          - Standardized extraction and quality checks to convert heterogeneous literature into publication-grade evidence tables, directly supporting 35+ peer-reviewed publications.

      - company: The John B. Pierce Laboratory, Yale University (now New Haven Innovation Labs)
        position: Neuroelectrophysiology Research Associate
        location: New Haven, CT
        start_date: 2019-01
        end_date: 2020-08
        summary: Engineered genetically encoded voltage indicators (GEVIs) on the Pentagon's DARPA Neural Engineering System Design (NESD) program.
        highlights:
          - Designed primers and mutagenesis strategies, generated variant libraries, constructed plasmids via sub-cloning, and produced/purified AAV vectors to validate expression and signal performance in neuronal systems.
          - Executed core molecular and cellular workflows (DNA purification, PCR, gel electrophoresis, site-directed mutagenesis, primary neuronal culture); supported in vivo and tissue-level validation including precision vibratome sectioning and organ-scale imaging.
          - The lab's high-throughput imaging requirements pushed formalization of computation and automation — sparking the pivot into machine learning and computer science.

    Projects:
      - name: SCRUB — Surgical Gloved-Hand Pose Estimation
        summary: Computer vision system for surgical hand pose estimation under domain shift, addressing the gap between bare-skin-trained pose models and the gloved-hand reality of operating rooms.
        highlights:
          - Accepted to the WiML Symposium at ICML 2026
          - Code release planned alongside the MICCAI 2027 submission window

      - name: Production LLM/RAG Service for Spine Oncology Decision Support
        highlights:
          - Privacy-safe LLM/RAG service deployed in spine tumor boards at Yale Neurosurgery, producing FHIR-like structured JSON with inline citations and SRE-grade observability for clinical decision support.

      - name: MindEye2-Demo
        url: https://github.com/WaverlyRose/mindeye2-demo
        highlights:
          - "Apple Silicon–optimized port of MindEye2 (Scotti et al., ICML 2024) for fMRI-to-image reconstruction. Reduced parameter count from ~200M+ to ~40M and memory footprint from 20+ GB to <6 GB while preserving >90% of original reconstruction quality."

      - name: Soft-kNN ICU Mortality
        highlights:
          - Soft-kNN imputation combined with propensity-weighted training for subgroup-fair ICU mortality prediction on MIMIC-IV. Manuscript in preparation; target venue AAAI 2027.

    Skills:
      - name: Foundation Models & Deep Learning
        keywords: PyTorch, JAX/Flax, Hugging Face Transformers, LangChain, LoRA/QLoRA, PEFT, SFT, RLHF, Transformers, RNNs, CNNs, Diffusion Models, RAG, Structured-Output Decoding, Tool-Use Agents

      - name: Biomedical & Scientific AI
        keywords: Multimodal Fusion (text, medical imaging, digital pathology, multi-omic genomics), Whole-Slide Imaging Pipelines, QuPath, CellProfiler, ImageJ, OpenCV, Clinical NLP, FHIR-aware Structured Outputs with Citation Grounding, Wet-Lab Foundations (GEVIs, primary neuronal culture, AAV vector production)

      - name: ML Infrastructure & Training Systems
        keywords: Distributed Training (DDP, FSDP, Mixed Precision), Weights & Biases, MLflow, Hydra, Evaluation Harnesses for LLMs and Retrieval, Vector Stores (FAISS, Chroma, pgvector), Kubernetes (EKS), Docker, AWS (S3, ECR), FastAPI/Pydantic, Go-based Orchestration, Grafana

      - name: Programming & Research Tooling
        keywords: Python (NumPy, Pandas, SciPy, scikit-learn, UMAP, statsmodels), Go, SQL, Bash, React, Git, GitHub Actions, CI/CD, AWS, GCP, Scientific Writing, Evidence Synthesis Methodology (PRISMA, TRIPOD)

