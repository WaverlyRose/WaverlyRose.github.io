cv:
  name: Waverly Rose Brim
  label: AI Research Engineer · Computational Medicine
  email: wrb@waverlyrose.io
  location: New York Metropolitan Area
  image: prof_pic.jpg
  summary: AI research engineer at the intersection of foundation models and biological data, with a track record of shipping production-grade ML systems for clinical use. Deep fluency in scientific data workflows across genomics, digital pathology, and biomedical imaging, grounded in wet-lab experience from a DARPA-funded neural engineering program. Research interests are multimodal foundation models, biomedical representation learning, clinical decision systems, and computational pathology.

